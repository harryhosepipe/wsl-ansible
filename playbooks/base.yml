---
- name: Base WSL Bootstrap
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    bootstrap_user: "{{ ansible_user_id }}"
    bootstrap_home: "{{ ansible_env.HOME }}"
    base_packages:
      - git
      - curl
      - wget
      - unzip
      - openssh-client
      - stow
      - fish
      - build-essential
      - ripgrep
      - fd-find
      - luarocks
    base_directories:
      - "{{ bootstrap_home }}/dev"
      - "{{ bootstrap_home }}/dev/projects"
      - "{{ bootstrap_home }}/.config"
      - "{{ bootstrap_home }}/.local/bin"
      - "{{ bootstrap_home }}/.local/share"
      - "{{ bootstrap_home }}/.cache"

  tasks:
    - name: Refresh apt cache
      become: true
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      become: true
      ansible.builtin.apt:
        name: "{{ base_packages }}"
        state: present

    - name: Create base directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ bootstrap_user }}"
        group: "{{ bootstrap_user }}"
        mode: "0755"
      loop: "{{ base_directories }}"
