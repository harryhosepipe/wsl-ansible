---
- name: Zsh And XDG Setup
  hosts: localhost
  connection: local
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Install zsh package
      become: true
      ansible.builtin.apt:
        name: zsh
        state: present

    - name: Create zsh config directory
      ansible.builtin.file:
        path: "{{ zsh_config_dir }}"
        state: directory
        owner: "{{ bootstrap_user }}"
        group: "{{ bootstrap_user }}"
        mode: "0755"

    - name: Install zshrc
      ansible.builtin.copy:
        dest: "{{ zsh_config_dir }}/.zshrc"
        owner: "{{ bootstrap_user }}"
        group: "{{ bootstrap_user }}"
        mode: "0644"
        content: |
          export HISTFILE="${XDG_STATE_HOME:-$HOME/.local/state}/zsh/history"
          export HISTSIZE=50000
          export SAVEHIST=50000

          setopt EXTENDED_HISTORY
          setopt HIST_FCNTL_LOCK
          setopt HIST_SAVE_BY_COPY
          setopt HIST_IGNORE_DUPS
          setopt HIST_IGNORE_SPACE
          setopt SHARE_HISTORY
          setopt AUTO_CD

          autoload -Uz compinit
          compinit -d "${XDG_CACHE_HOME:-$HOME/.cache}/zsh/zcompdump-${ZSH_VERSION}"

          if [ -s "${NVM_DIR:-${XDG_DATA_HOME:-$HOME/.local/share}/nvm}/nvm.sh" ]; then
            . "${NVM_DIR:-${XDG_DATA_HOME:-$HOME/.local/share}/nvm}/nvm.sh"
          fi

    - name: Install zprofile
      ansible.builtin.copy:
        dest: "{{ zsh_config_dir }}/.zprofile"
        owner: "{{ bootstrap_user }}"
        group: "{{ bootstrap_user }}"
        mode: "0644"
        content: |
          if [ -r "$HOME/.profile" ]; then
            . "$HOME/.profile"
          fi

          ssh_agent_env="${SSH_AGENT_ENV:-{{ ssh_agent_env_path }}}"
          github_key="{{ github_private_key_path }}"
          github_pub="{{ github_public_key_path }}"

          if [ -r "$ssh_agent_env" ]; then
            . "$ssh_agent_env" >/dev/null 2>&1

            if ! kill -0 "$SSH_AGENT_PID" 2>/dev/null; then
              unset SSH_AGENT_PID
              unset SSH_AUTH_SOCK
            fi
          fi

          if [ -z "$SSH_AUTH_SOCK" ] || ! ssh-add -l >/dev/null 2>&1; then
            eval "$(ssh-agent -s)" >/dev/null
            printf 'export SSH_AUTH_SOCK=%q\nexport SSH_AGENT_PID=%q\n' \
              "$SSH_AUTH_SOCK" "$SSH_AGENT_PID" > "$ssh_agent_env"
            chmod 600 "$ssh_agent_env"
          fi

          if [ -r "$github_key" ] && [ -r "$github_pub" ] && ! ssh-add -T "$github_pub" >/dev/null 2>&1; then
            ssh-add "$github_key" < /dev/tty
          fi

    - name: Set zsh as login shell
      become: true
      ansible.builtin.user:
        name: "{{ bootstrap_user }}"
        shell: /usr/bin/zsh
