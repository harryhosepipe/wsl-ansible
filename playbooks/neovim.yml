---
- name: Neovim And LazyVim
  hosts: localhost
  connection: local
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  vars:
    neovim_arch_map:
      x86_64: x86_64
      aarch64: arm64
    neovim_arch: "{{ neovim_arch_map[ansible_architecture] | default(ansible_architecture) }}"
    lazyvim_config_dir: "{{ xdg_config_home }}/nvim"

  tasks:
    - name: Get latest Neovim release metadata
      ansible.builtin.uri:
        url: https://api.github.com/repos/neovim/neovim/releases/latest
        return_content: true
      register: neovim_release

    - name: Check for installed Neovim
      ansible.builtin.command: /usr/local/bin/nvim --version
      register: installed_nvim
      failed_when: false
      changed_when: false

    - name: Set Neovim release facts
      ansible.builtin.set_fact:
        neovim_version: "{{ neovim_release.json.tag_name }}"
        neovim_archive_name: "nvim-linux-{{ neovim_arch }}.tar.gz"
        neovim_archive_path: "/tmp/nvim-linux-{{ neovim_arch }}.tar.gz"

    - name: Set Neovim download URL
      ansible.builtin.set_fact:
        neovim_download_url: >-
          {{
            neovim_release.json.assets
            | selectattr('name', 'equalto', neovim_archive_name)
            | map(attribute='browser_download_url')
            | first
          }}

    - name: Download Neovim archive
      become: true
      ansible.builtin.get_url:
        url: "{{ neovim_download_url }}"
        dest: "{{ neovim_archive_path }}"
        mode: "0644"
      when: installed_nvim.rc != 0 or (neovim_version not in installed_nvim.stdout)

    - name: Install Neovim
      become: true
      ansible.builtin.unarchive:
        src: "{{ neovim_archive_path }}"
        dest: /usr/local
        remote_src: true
        extra_opts:
          - --strip-components=1
      when: installed_nvim.rc != 0 or (neovim_version not in installed_nvim.stdout)

    - name: Check for existing Neovim config
      ansible.builtin.stat:
        path: "{{ lazyvim_config_dir }}"
      register: nvim_config_dir

    - name: Install LazyVim starter
      ansible.builtin.git:
        repo: https://github.com/LazyVim/starter
        dest: "{{ lazyvim_config_dir }}"
        depth: 1
      when: not nvim_config_dir.stat.exists

    - name: Remove LazyVim starter git metadata
      ansible.builtin.file:
        path: "{{ lazyvim_config_dir }}/.git"
        state: absent
      when: not nvim_config_dir.stat.exists
