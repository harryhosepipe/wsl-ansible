---
- name: Clone dotfiles repository
  git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ dotfiles_path }}"
    version: main
  become_user: "{{ user_name }}"

- name: Remove existing dotfiles that would conflict with stow
  file:
    path: "{{ user_home }}/{{ item }}"
    state: absent
  loop:
    - .gitconfig
    - .gitignore_global
  become_user: "{{ user_name }}"

- name: Stow dotfiles packages
  shell: |
    cd "{{ dotfiles_path }}"
    stow {{ stow_packages | join(' ') }}
  become_user: "{{ user_name }}"
  args:
    executable: /bin/bash

- name: Install Fisher plugin manager for Fish
  shell: |
    curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source && fisher install jorgebucaran/fisher
  become_user: "{{ user_name }}"
  args:
    executable: /usr/bin/fish
  ignore_errors: yes

- name: Set git configuration for XDG compliance
  git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - { name: "core.excludesfile", value: "~/.config/git/ignore" }
  become_user: "{{ user_name }}"